<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="admin-header">
    <div>
      <p class="kicker">Admin Portal</p>
      <h1>Sign In</h1>
    </div>
    <a class="ghost-link" href="../index.html">Back to site</a>
  </header>

  <main class="login-container">
    <div class="login-card">
      <h2>Admin Login</h2>
      <p id="statusText">Enter your credentials to access the admin dashboard.</p>

      <form id="authForm" class="auth-form">
        <label>
          Admin email
          <input type="email" id="adminEmail" autocomplete="email" placeholder="admin@example.com">
        </label>
        <label>
          Password
          <input type="password" id="adminPassword" autocomplete="current-password" placeholder="Password">
        </label>
        <div class="button-row">
          <button type="submit" class="icon-button text-button" title="Sign in">
            <i data-lucide="log-in"></i>
            <span>Sign in</span>
          </button>
          <button type="button" id="signOutBtn" class="icon-button subtle-button" title="Sign out">
            <i data-lucide="log-out"></i>
            <span>Sign out</span>
          </button>
        </div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../supabase-config.js"></script>
  <script src="login.js"></script>
</body>
</html>
